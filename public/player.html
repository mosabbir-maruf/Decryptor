<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Decryptor — HLS Player</title>
    <script src="/hls.min.js"></script>
    <style>
      :root { color-scheme: dark; }
      body { font: 14px/1.5 system-ui, sans-serif; margin: 0; background: #0e0e11; color: #eee; }
      header { padding: 1rem 1.25rem; background: #15151b; border-bottom: 1px solid #26262e; }
      h1 { font-size: 1.1rem; margin: 0 0 .25rem; }
      .hint { color: #9a9aa6; font-size: .8rem; }
      main { padding: 1.25rem; max-width: 960px; margin: 0 auto; }
      .row { display: flex; gap: .5rem; flex-wrap: wrap; }
      input { flex: 1 1 60%; min-width: 260px; padding: .6rem; background: #1b1b22; border: 1px solid #2c2c36; color: #eee; border-radius: 8px; }
      button { padding: .6rem 1rem; border: 0; border-radius: 8px; background: #5b6cff; color: #fff; cursor: pointer; }
      button.sec { background: #2c2c36; }
      video { width: 100%; margin-top: 1rem; background: #000; border-radius: 10px; aspect-ratio: 16/9; }
      .vwrap { position: relative; margin-top: 1rem; }
      .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        background: rgba(0,0,0,.45); color: #fff; font-size: 1.1rem; cursor: pointer; border-radius: 10px; }
      .overlay.hidden { display: none; }
      .ctrls { display: flex; flex-wrap: wrap; gap: .75rem; margin-top: .6rem; }
      .ctrls label { display: flex; align-items: center; gap: .4rem; font-size: .8rem; color: #9a9aa6; }
      .ctrls select { padding: .45rem .6rem; background: #1b1b22; border: 1px solid #2c2c36; color: #eee; border-radius: 8px; }
      pre { background: #15151b; padding: 1rem; border-radius: 8px; overflow: auto; max-height: 12rem; margin-top: 1rem; }
    </style>
  </head>
  <body>
    <header>
      <h1>Decryptor — HLS Player (hls.js)</h1>
      <div class="hint">
        Paste a direct <code>.m3u8</code> (or our <code>/proxy?...</code>) URL, or an
        embed/TMDB URL (vidhideplus / turbovidhls / lulustream / vidara / themoviedb.org).
      </div>
    </header>
    <main>
      <div class="row">
        <input id="url" placeholder="https://.../master.m3u8  or  https://vidhideplus.com/v/..." />
        <button id="play">Load &amp; Play</button>
        <button id="clear" class="sec">Clear</button>
      </div>
      <div class="vwrap">
        <video id="video" controls></video>
        <div id="overlay" class="overlay hidden">Click to play</div>
      </div>
      <div class="ctrls">
        <label>Quality <select id="quality"><option value="-1">Auto</option></select></label>
        <label>Audio <select id="audio"><option value="-1">Default</option></select></label>
        <label>Subtitles <select id="subs"><option value="-1">Off</option></select></label>
      </div>
      <pre id="log">idle…</pre>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const $log = $('log'), $url = $('url'), $playBtn = $('play'), $clearBtn = $('clear');
      const $quality = $('quality'), $subs = $('subs'), $audio = $('audio');
      const log = (m) => { console.log('[player]', m); $log.textContent += '\n' + String(m); };
      const video = $('video');
      const overlay = $('overlay');
      const isEmbed = /vidhideplus|callistanise|lulustream|luluvdo|vidara|turbovidhls|themoviedb\.org/;
      let hls = null;

      function showOverlay(msg) {
        overlay.textContent = msg || 'Click to play';
        overlay.classList.remove('hidden');
      }
      function hideOverlay() { overlay.classList.add('hidden'); }

      overlay.onclick = () => {
        video.muted = true;
        video.play().then(hideOverlay).catch(() => showOverlay('Click to play'));
      };
      video.addEventListener('playing', hideOverlay);
      video.addEventListener('play', hideOverlay);

      function destroy() {
        if (hls) { hls.destroy(); hls = null; }
        video.pause(); video.removeAttribute('src'); video.load();
        hideOverlay();
        $quality.innerHTML = '<option value="-1">Auto</option>';
        $audio.innerHTML = '<option value="-1">Default</option>';
        $subs.innerHTML = '<option value="-1">Off</option>';
      }

      // Build the Quality / Audio / Subtitle <select>s from the parsed manifest.
      function populateControls(data) {
        const qOpts = ['<option value="-1">Auto</option>'];
        data.levels.forEach((lvl, i) => {
          const label = lvl.height ? lvl.height + 'p' : Math.round((lvl.bitrate || 0) / 1000) + 'k';
          qOpts.push(`<option value="${i}">${label}</option>`);
        });
        $quality.innerHTML = qOpts.join('');
        $quality.value = String(hls.autoLevelEnabled ? -1 : hls.currentLevel);

        const aOpts = ['<option value="-1">Default</option>'];
        data.audioTracks.forEach((t, i) => {
          aOpts.push(`<option value="${i}">${t.name || t.lang || 'Track ' + (i + 1)}</option>`);
        });
        $audio.innerHTML = aOpts.join('');

        const sOpts = ['<option value="-1">Off</option>'];
        (hls.subtitleTracks || []).forEach((t, i) => {
          sOpts.push(`<option value="${i}">${t.name || t.lang || 'Track ' + (i + 1)}</option>`);
        });
        $subs.innerHTML = sOpts.join('');
      }

      $quality.onchange = () => { if (hls) hls.currentLevel = parseInt($quality.value, 10); };
      $audio.onchange = () => { if (hls) hls.audioTrack = parseInt($audio.value, 10); };
      $subs.onchange = () => { if (hls) { hls.subtitleTrack = parseInt($subs.value, 10); hls.subtitleDisplay = $subs.value !== '-1'; } };

      function play(src) {
        destroy();
        if (!window.Hls) {
          log('ERROR: hls.min.js failed to load (check /hls.min.js is served).');
          return;
        }
        log('hls.js v' + (Hls.version || '?'));
        const onReady = () => {
          log('manifest ready — starting playback (muted)…');
          video.muted = true; // muted autoplay is usually allowed
          video.play().catch((e) => {
            showOverlay('Click to play');
            log('playback blocked (' + e.name + '): click the video');
          });
        };

        if (Hls.isSupported()) {
            hls = new Hls({
              enableWorker: false,
              maxBufferLength: 30,
              maxMaxBufferLength: 60,
              backBufferLength: 15,
              startLevel: 0,
            });
            hls.on(Hls.Events.MANIFEST_PARSED, (_ev, data) => {
              log('manifest parsed (' + (data.levels?.length || 0) + ' levels, ' + (data.audioTracks?.length || 0) + ' audio)');
              populateControls(data);
              const eng = data.audioTracks?.findIndex(t => (t.lang || '').startsWith('eng') || (t.name || '').includes('English'));
              if (eng >= 0) {
                setTimeout(() => {
                  hls.audioTrack = eng;
                  $audio.value = String(eng);
                }, 100);
              }
              onReady();
            });
            hls.on(Hls.Events.ERROR, (_e, d) => {
              const msg = d.type + ' / ' + d.details + (d.response ? ' (HTTP ' + d.response.code + ')' : '');
              if (d.fatal) { log('FATAL: ' + msg); }
              else log('warn: ' + msg);
            });
            hls.on(Hls.Events.LEVEL_SWITCHED, (_ev, d) => {
              $quality.value = String(hls.autoLevelEnabled ? -1 : d.level);
            });
            hls.attachMedia(video);
            hls.loadSource(src);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          log('falling back to native HLS (Safari/iOS)');
          video.src = src;
          video.addEventListener('loadedmetadata', onReady, { once: true });
        } else {
          log('HLS not supported in this browser');
        }
      }

      async function load(raw) {
        raw = (raw || '').trim();
        if (!raw) return;
        $url.value = raw;
        $log.textContent = '';
        log('resolving ' + raw);
        try {
          // Plain numeric ID → treat as TMDB movie
          if (/^\d+$/.test(raw)) {
            raw = 'https://www.themoviedb.org/movie/' + raw;
            $url.value = raw;
          }
          const embed = isEmbed.test(raw);
          let src = raw;
          if (embed) {
            const res = await fetch('/api/extract', {
              method: 'POST', headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ url: raw }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'extract failed');
            src = data.proxyUrl;
            log('extracted → ' + src);
          } else {
            log('loading m3u8 directly → ' + src);
          }
          play(src);
        } catch (err) {
          log('error: ' + err.message);
        }
      }

      $playBtn.onclick = () => load($url.value);

      // Auto-play if ?url=<embed or m3u8/proxy> is present (one-click links).
      const initial = new URLSearchParams(location.search).get('url');
      if (initial) load(initial);

      $clearBtn.onclick = () => { destroy(); $url.value = ''; log('idle…'); };
    </script>
  </body>
</html>
