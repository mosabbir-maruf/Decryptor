services:
  decryptor:
    build:
      context: .
      dockerfile: Dockerfile
    image: decryptor:latest
    container_name: decryptor
    restart: unless-stopped
    ports:
      - "${PORT:-3030}:3030"
    environment:
      - NODE_ENV=production
      - PORT=3030
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3030/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
